# TSI DX Node - Universal Docker Compose (Public Release)

x-db-credentials: &db-credentials
  POSTGRES_DB: "${POSTGRES_DB:-tsi_dx_node}"
  POSTGRES_USER: "${POSTGRES_USER:-tsi_admin}"
  POSTGRES_PASSWORD: "${POSTGRES_PASSWD:-secure_dev_password}"

services:
  # 1. PostgreSQL Database Service
  database:
    image: postgres:15-alpine
    # REMOVED: container_name to allow multiple instances via project flags
    # container_name: tsi_dx_node_db
    restart: unless-stopped
    environment:
      <<: *db-credentials
    ports:
      - "${DB_PORT_MAP:-5434:5432}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
   
  # 2. Java Jetty Web Application Service
  server:
    # Build from local source
    # build:
    #  context: .
    #  dockerfile: Dockerfile

    # PRODUCTION: override with a pre-built image by setting IMAGE_NAME in .env
    image: "${IMAGE_NAME:-tsicoop/tsi-dx-node:latest}"
    
    user: "root"
    # REMOVED: container_name to allow multiple instances via project flags
    # container_name: tsi_dx_node_server
    restart: unless-stopped
    
    ports:
      - "${APP_PORT_MAP:-8082:8080}"
    
    environment:
      POSTGRES_HOST: "jdbc:postgresql://database:5432"
      POSTGRES_DB: "${POSTGRES_DB:-tsi_dx_node}"
      POSTGRES_USER: "${POSTGRES_USER:-tsi_admin}"
      POSTGRES_PASSWD: "${POSTGRES_PASSWD:-secure_dev_password}"
      TSI_DX_NODE_ENV: "${TSI_DX_NODE_ENV:-production}"
      TSI_DX_NODE_JWT_SECRET: "${TSI_PRIVACY_VAULT_JWT_SECRET:-your_32_character_long_secure_secret_here}"
      TSI_EXPORT_PATH: "${TSI_EXPORT_PATH:-/var/lib/tsi/exports/}"
    
    volumes:
      - "tsi_reports_data:${TSI_EXPORT_PATH:-/var/lib/tsi/exports/}:rw"
    
    depends_on:
      database:
        condition: service_healthy

  # 3. Sync Contract Mock Responder (for local testing only)
  # Listens on port 8099 and returns {"result":"ok"} for any POST.
  # Set sync_responder_url = http://mock-responder:8099/<path> in your test contract.
  # Remove or comment out this service before deploying to production.
  mock-responder:
    image: python:3.12-alpine
    restart: unless-stopped
    command: python3 /app/mock_responder.py
    volumes:
      - ./test/mock_responder.py:/app/mock_responder.py:ro

# Infrastructure Definitions
volumes:
  postgres_data:      
  tsi_reports_data: