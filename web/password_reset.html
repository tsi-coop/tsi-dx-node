<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Recovery | TSI DX Node</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        :root { --dx-primary: #0f172a; --dx-accent: #ef4444; --background: #f8fafc; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--background);
            background-image: radial-gradient(circle at 2px 2px, #e2e8f0 1px, transparent 0);
            background-size: 32px 32px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .dx-card {
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            border-top: 5px solid var(--dx-primary);
        }
        .input-focus:focus {
            border-color: var(--dx-primary);
            box-shadow: 0 0 0 3px rgba(15, 23, 42, 0.1);
        }
        .animated-button {
            background-color: var(--dx-primary);
            color: white;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .animated-button:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgba(15, 23, 42, 0.2);
        }
    </style>
</head>
<body>

<div class="w-full max-w-md p-10 bg-white rounded-2xl dx-card">
    <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center p-4 bg-red-600 rounded-2xl mb-6 shadow-lg">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m-2 4a2 2 0 012 2m-2-4a2 2 0 01-2-2m2 4a2 2 0 01-2 2m5-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
            </svg>
        </div>
        <h2 class="text-2xl font-black text-slate-900 tracking-tight uppercase">Emergency Reset</h2>
        <p class="text-[10px] text-slate-400 font-bold uppercase tracking-[0.2em] mt-1">Break Glass Recovery Portal</p>
    </div>

    <form id="resetForm" onsubmit="handleReset(event)" class="space-y-5">
        <div>
            <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-widest mb-2 px-1">Registered Email</label>
            <input type="email" id="email" required class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none transition-all text-sm input-focus" placeholder="admin@tsicoop.org">
        </div>

        <div>
            <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-widest mb-2 px-1">Master Recovery Key</label>
            <input type="text" id="masterKey" required class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none transition-all text-sm font-mono input-focus" placeholder="MK-XXXX-XXXX-XXXX">
        </div>

        <div class="pt-4 border-t border-slate-100">
            <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-widest mb-2 px-1">New Permanent Password</label>
            <input type="password" id="newPassword" required minlength="12" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none transition-all text-sm input-focus" placeholder="••••••••••••">
        </div>

        <div>
            <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-widest mb-2 px-1">Confirm New Password</label>
            <input type="password" id="confirmPassword" required minlength="12" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none transition-all text-sm input-focus" placeholder="••••••••••••">
        </div>

        <button type="submit" id="resetBtn" class="animated-button w-full py-4 rounded-xl font-bold text-xs uppercase tracking-[0.2em] shadow-lg mt-2">
            Finalize Recovery
        </button>

        <div id="feedback" class="hidden p-3 rounded-lg text-[10px] font-black uppercase text-center border"></div>
    </form>

    <div class="mt-8 text-center">
        <a href="index.html" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest hover:text-slate-600 transition-colors">&larr; Back to Login</a>
    </div>
</div>

<script>
async function handleReset(event) {
    event.preventDefault();
    const btn = document.getElementById('resetBtn');
    const feedback = document.getElementById('feedback');
    const pass = document.getElementById('newPassword').value;
    const confirm = document.getElementById('confirmPassword').value;

    if (pass !== confirm) {
        showFeedback("Passwords do not match", "bg-red-50 text-red-600 border-red-100");
        return;
    }

    btn.disabled = true;
    btn.innerText = "AUTHENTICATING...";
    feedback.classList.add('hidden');

    try {
        const payload = {
            _func: "reset_password_with_key",
            email: document.getElementById('email').value,
            master_key: document.getElementById('masterKey').value,
            new_password: pass
        };

        const response = await fetch('/api/admin/passwordreset', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        const data = await response.json();

        if (response.ok && data.success) {
            showFeedback("Password secured. Redirecting...", "bg-green-50 text-green-700 border-green-100");
            setTimeout(() => { window.location.href = 'index.html'; }, 1500);
        } else {
            throw new Error(data.message || "Invalid master key or email");
        }
    } catch (err) {
        showFeedback(err.message, "bg-red-50 text-red-600 border-red-100");
        btn.disabled = false;
        btn.innerText = "Finalize Recovery";
    }
}

function showFeedback(text, classes) {
    const el = document.getElementById('feedback');
    el.innerText = text;
    el.className = `p-3 mt-4 rounded-lg text-[10px] font-black uppercase text-center border ${classes}`;
    el.classList.remove('hidden');
}
</script>
</body>
</html>
