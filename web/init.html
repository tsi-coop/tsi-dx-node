<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TSI DX Node - System Initialization</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        
        :root {
            --dx-primary: #0f172a; /* Slate 900 */
            --dx-accent: #3b82f6;  /* Blue 500 */
            --background: #f1f5f9;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--background);
            background-image: 
                radial-gradient(circle at 2px 2px, #cbd5e1 1px, transparent 0);
            background-size: 32px 32px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .dx-card {
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            border-top: 5px solid var(--dx-primary);
        }

        .animated-button {
            background-color: var(--dx-primary);
            color: white;
            position: relative;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .animated-button:hover:not(:disabled) {
            background-color: #1e293b;
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgba(15, 23, 42, 0.3);
        }

        .animated-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(120deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.15) 50%, rgba(255,255,255,0) 100%);
            transform: skewX(-25deg);
        }

        .animated-button:hover::before {
            animation: shine 1.5s infinite;
        }

        @keyframes shine {
            0% { left: -100%; }
            100% { left: 200%; }
        }

        .input-focus:focus {
            border-color: var(--dx-accent);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>

<div class="w-full max-w-lg p-10 bg-white rounded-2xl dx-card z-10 max-h-[90vh] overflow-y-auto custom-scrollbar">
    <!-- Branding Header -->
    <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center p-4 bg-slate-900 rounded-2xl mb-6 shadow-lg">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
            </svg>
        </div>
        <h2 class="text-2xl font-extrabold text-slate-900 tracking-tight uppercase">Node Initialization</h2>
        <p class="text-[10px] text-slate-400 font-bold uppercase tracking-[0.2em] mt-1">Set Protocol Identity & Master Admin</p>
    </div>

    <div id="setup-message" class="p-3 mb-6 rounded-lg text-center hidden"></div>

    <form id="setup-form" class="space-y-5">
        <!-- Node Configuration Section -->
        <div class="p-4 bg-slate-50 border border-slate-200 rounded-xl space-y-4">
            <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest border-b border-slate-200 pb-2">Protocol Identity</h3>
            <div class="grid grid-cols-1 gap-4">
                <div>
                    <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-widest mb-2 px-1">Immutable Node ID</label>
                    <!-- UPDATED: Set YOURDOMAIN-001 as a placeholder hint instead of a default value -->
                    <input type="text" id="nodeId" required placeholder="e.g., YOURDOMAIN-001"
                        class="w-full px-4 py-3 bg-white border border-slate-200 rounded-xl outline-none transition-all text-sm font-mono input-focus">
                </div>
                <div class="grid grid-cols-3 gap-4">
                    <div class="col-span-2">
                        <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-widest mb-2 px-1">Public FQDN</label>
                        <input type="text" id="fqdn" required placeholder="dx.yourdomain.org"
                            class="w-full px-4 py-3 bg-white border border-slate-200 rounded-xl outline-none transition-all text-sm font-bold input-focus">
                    </div>
                    <div>
                        <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-widest mb-2 px-1">Port (mTLS)</label>
                        <input type="number" id="networkPort" required value="8443" min="1" max="65535"
                            class="w-full px-4 py-3 bg-white border border-slate-200 rounded-xl outline-none transition-all text-sm font-bold input-focus">
                    </div>
                </div>
            </div>
        </div>

        <!-- Master Admin Section -->
        <div class="space-y-5">
            <div>
                <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-widest mb-2 px-1">Admin Email (System ID)</label>
                <input type="email" id="email" required placeholder="admin@tsicoop.org"
                    class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none transition-all text-sm input-focus">
            </div>

            <div>
                <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-widest mb-2 px-1">Admin User Name</label>
                <input type="text" id="name" required placeholder="System Lead"
                    class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none transition-all text-sm input-focus">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-widest mb-2 px-1">Password</label>
                    <input type="password" id="password" required minlength="12" placeholder="••••••••••••"
                        class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none transition-all text-sm input-focus">
                </div>

                <div>
                    <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-widest mb-2 px-1">Confirm</label>
                    <input type="password" id="password-confirm" required minlength="12" placeholder="••••••••••••"
                        class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none transition-all text-sm input-focus">
                </div>
            </div>
        </div>

        <button type="submit" id="setup-btn" class="animated-button w-full py-4 rounded-xl font-bold text-xs uppercase tracking-[0.2em] shadow-lg mt-2">
            Establish Node Authority
        </button>
    </form>

    <div class="mt-8 text-center hidden" id="success-container">
        <div class="p-4 bg-green-50 border border-green-100 rounded-xl mb-6">
            <p class="text-xs font-bold text-green-700">Root credentials secured. Protocol registry updated.</p>
        </div>
        <a href="index.html" class="inline-flex items-center px-6 py-3 bg-slate-900 text-white rounded-xl text-xs font-black uppercase tracking-widest hover:bg-slate-800 transition-all shadow-md">
            Proceed to Login Gateway
        </a>
    </div>

    <div class="mt-8 pt-6 border-t border-slate-100 text-center">
        <p class="text-[9px] text-slate-400 font-medium uppercase tracking-widest">
            Bootstrap Engine v1.2.0 | <span class="text-slate-600 font-bold">DX-CORE</span>
        </p>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const API_SETUP_URL = '/api/admin/registeradmin'; 
        
        const form = document.getElementById('setup-form');
        const messageArea = document.getElementById('setup-message');
        const setupBtn = document.getElementById('setup-btn');
        const successContainer = document.getElementById('success-container');

        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const nodeId = document.getElementById('nodeId').value;
            const fqdn = document.getElementById('fqdn').value;
            const port = document.getElementById('networkPort').value;
            const email = document.getElementById('email').value;
            const name = document.getElementById('name').value;
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('password-confirm').value;

            if (password !== confirm) {
                showMessage("Error: Credentials do not match", "bg-red-50 text-red-600 border border-red-100");
                return;
            }

            setupBtn.disabled = true;
            setupBtn.textContent = 'SECURIING REGISTRY...';
            messageArea.classList.add('hidden');

            try {
                const payload = {
                    "node_id": nodeId,
                    "fqdn": fqdn,
                    "network_port": parseInt(port),
                    "email": email,
                    "username": name,
                    "password": password,
                    "confirm": confirm
                };

                const response = await fetch(API_SETUP_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (response.ok && (data.success || data._created)) {
                    form.classList.add('hidden');
                    successContainer.classList.remove('hidden');
                    document.querySelector('h2').innerText = "Node Ready";
                    document.querySelector('p.text-slate-400').innerText = "Registry successfully initialized";
                } else {
                    throw new Error(data.message || "Authority registration rejected");
                }
            } catch (err) {
                showMessage(`Initialization Failure: ${err.message}`, "bg-red-50 text-red-600 border border-red-100");
                setupBtn.disabled = false;
                setupBtn.textContent = 'Establish Node Authority';
            }
        });

        function showMessage(text, classes) {
            messageArea.textContent = text;
            messageArea.className = `p-3 mb-6 rounded-lg text-[10px] font-black uppercase text-center ${classes}`;
            messageArea.classList.remove('hidden');
        }
    });
</script>
</body>
</html>
